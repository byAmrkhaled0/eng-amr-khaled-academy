<div class="login-page" id="adminRoot">
<div class="card login-card">
<div class="logo"><span class="logo-mark" aria-hidden="true"></span><span>Techno Minds <small>Programming &amp; AI</small></span></div>
<h1 class="section-title" style="font-size:2.3rem;margin:22px 0 8px">تسجيل دخول المدرس</h1>
<p style="color:var(--muted);font-weight:800;margin-top:0">استخدم البريد الموجود في قائمة Firebase Authentication، وليس قيمة حقل البريد داخل مستند Firestore. بعد أول دخول ناجح تُصلح المنصة مستند الإدارة تلقائيًا.</p>
<form class="grid" id="loginForm">
<div class="field"><label for="adminEmail">البريد الإلكتروني</label><input id="adminEmail" autocomplete="username" inputmode="email" name="email" placeholder="اكتب بريد المدرس" required="" type="email" dir="ltr"/></div>
<div class="field"><label for="adminPassword">كلمة المرور</label><input id="adminPassword" autocomplete="current-password" name="password" placeholder="اكتب كلمة المرور" required="" type="password" dir="ltr"/></div>
<button class="btn primary" type="submit"><span data-icon="user-check"></span> دخول لوحة التحكم</button>
<button class="btn ghost" id="adminPasswordReset" type="button">نسيت كلمة المرور؟ أرسل رابط إعادة الضبط</button>
</form>
</div>
</div>
